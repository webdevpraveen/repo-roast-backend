<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Roast API | AI-Powered Code Humiliation</title>
    <meta name="description" content="The backend engine for Repo Roast. Brutally honest AI-powered GitHub repository roasting.">
    <style>
        body {
            background: #111;
            color: #FF4500;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 5px; }
        p { color: #888; font-size: 1.2rem; }
        .status { margin-top: 2rem; padding: 1rem 2rem; border: 1px solid #FF4500; border-radius: 4px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        a { color: #FFB800; text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s; }
        a:hover { border-bottom: 1px solid #FFB800; }
    </style>
</head>
<body>
    <h1>REPO ROAST API</h1>
    <p>The brain is active. The AI is judging.</p>
    <div class="status">SYSTEM ONLINE: READY TO ROAST</div>
    <p style="margin-top: 3rem;">View the UI: <a href="https://repo-roast-wdp.vercel.app">repo-roast-wdp.vercel.app</a></p>
</body>
</html>
